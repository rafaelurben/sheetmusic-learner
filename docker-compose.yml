  # MinIO for local S3-compatible storage
  minio:
    container_name: minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9090:9001" # MinIO Console
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minio-admin
      MINIO_ROOT_PASSWORD: minio-admin
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # One-time MinIO bootstrap for local app credentials and bucket
  minio-bootstrap:
    container_name: minio-bootstrap
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minio-admin
      MINIO_ROOT_PASSWORD: minio-admin
      MINIO_APP_ACCESS_KEY: sheetmusic-access
      MINIO_APP_SECRET_KEY: sheetmusic-secret
      MINIO_APP_BUCKET: sheetmusic-learner-scores
    volumes:
      - minio-data:/data
    entrypoint: [ "/bin/sh", "-eu", "-c" ]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc admin user info local "$$MINIO_APP_ACCESS_KEY" >/dev/null 2>&1 || mc admin user add local "$$MINIO_APP_ACCESS_KEY" "$$MINIO_APP_SECRET_KEY"
        mc admin policy attach local readwrite --user "$$MINIO_APP_ACCESS_KEY"
        mc mb --ignore-existing "local/$$MINIO_APP_BUCKET"
        mc anonymous set download "local/$$MINIO_APP_BUCKET"
        echo "MinIO bootstrap completed."
