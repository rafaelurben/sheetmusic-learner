volumes:
  postgres-data:
  minio-data:

services:
  postgresdb:
    container_name: postgresdb
    image: postgres:18.2-trixie
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"

  # https://github.com/Soluto/oidc-server-mock
  oidc-server-mock:
    container_name: oidc-server-mock
    image: ghcr.io/soluto/oidc-server-mock:0.9.2 # <10 needed for ARM compatibility
    restart: unless-stopped
    ports:
      - "4011:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNET_SERVICES_OPTIONS_INLINE: |
        {
          "ForwardedHeadersOptions": {
            "ForwardedHeaders" : "All"
          }
        }
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": {
            "ShowKeySet": true
          },
          "Authentication": {
            "CookieSameSiteMode": "Lax",
            "CheckSessionCookieSameSiteMode": "Lax"
          }
        }
      SERVER_CORS_ALLOWED_ORIGINS_INLINE: |
        [
          "http://localhost:5173",
          "https://vite.local"
        ]
      LOGIN_OPTIONS_INLINE: |
        {
          "AllowRememberLogin": false
        }
      LOGOUT_OPTIONS_INLINE: |
        {
          "AutomaticRedirectAfterSignOut": true
        }
      API_SCOPES_INLINE: |
        [
          {
            "Name": "api",
            "DisplayName": "Backend API access",
            "UserClaims": [
              "name",
              "email",
              "picture"
            ]
