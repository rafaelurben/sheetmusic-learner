volumes:
  postgres-data:
  minio-data:

include:
  - docker-compose.yml

services:
  frontend:
    container_name: frontend
    image: sheetmusic-learner-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
  backend:
    container_name: backend
    image: sheetmusic-learner-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,local-docker
      APP_OIDC_ISSUER: http://host.docker.internal:4011
      APP_S3_PUBLIC_BASE_URL: http://localhost:9000
