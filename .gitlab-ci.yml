stages:
  - checks
  - build
  - docker

variables:
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug

backend::spotless_check:
  stage: checks
  image: maven:3.9.11-eclipse-temurin-25
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository
  script:
    - mvn -B -f backend/pom.xml spotless:check

frontend::lint:
  stage: checks
  image: ghcr.io/rafaelurben/node25-trixie-with-jdk25:latest
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/.npm
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run generate:openapi
    - npm run lint
    - npx tsc -b

backend::build_artifact:
  stage: build
  image: maven:3.9.11-eclipse-temurin-25
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository
  script:
    - mvn -B -f backend/pom.xml -DskipTests package
  artifacts:
    paths:
      - backend/target/backend-*.jar
    expire_in: 1 day

frontend::build_artifact:
  stage: build
  image: ghcr.io/rafaelurben/node25-trixie-with-jdk25:latest
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/.npm
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/dist
      - frontend/nginx.conf
    expire_in: 1 day

backend::docker_image:
  stage: docker
  image:
    name: $KANIKO_IMAGE
    entrypoint: [ "" ]
  needs:
    - job: backend::build_artifact
      artifacts: true
  script:
    - |
      mkdir -p /kaniko/.docker
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-backend:$CI_COMMIT_SHA" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-backend:latest"
      else
        /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-backend:$CI_COMMIT_SHA"
      fi

frontend::docker_image:
  stage: docker
  image:
    name: $KANIKO_IMAGE
    entrypoint: [ "" ]
  needs:
    - job: frontend::build_artifact
      artifacts: true
  script:
    - |
      mkdir -p /kaniko/.docker
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-frontend:$CI_COMMIT_SHA" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-frontend:latest"
      else
        /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile" --destination "$CI_REGISTRY_IMAGE/sheetmusic-learner-frontend:$CI_COMMIT_SHA"
      fi
