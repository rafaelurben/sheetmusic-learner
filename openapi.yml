openapi: 3.1.0
info:
  title: sheetmusic-learner
  version: 0.0.1
  description: An application for collaboratively learning sheetmusic.
  contact:
    name: Rafael Urben
    url: https://www.rafaelurben.ch/impressum
servers:
  - url: 'http://localhost:8080'

security:
  - bearerAuth: [ ]

paths:
  /api/v1/public/frontend-config:
    get:
      summary: Get frontend configuration
      operationId: getFrontendConfig
      tags:
        - public
      responses:
        '200':
          description: Frontend configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendConfigDto'
  /api/v1/users/me:
    get:
      summary: Get the current user
      operationId: getCurrentUser
      tags:
        - users
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/by-email:
    get:
      summary: Get a user by email address
      operationId: getUserByEmail
      tags:
        - users
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/pieces:
    get:
      summary: Get all accessible pieces
      operationId: getPieces
      tags:
        - pieces
      responses:
        '200':
          description: List of pieces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PieceMetadataDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new piece
      operationId: createPiece
      tags:
        - pieces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PieceCreateRequestDto'
      responses:
        '201':
          description: Created piece
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieceDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pieces/{id}:
    get:
      summary: Get a specific piece
      operationId: getPiece
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Piece
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieceDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete a specific piece
      operationId: deletePiece
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pieces/{id}/score/upload:
    post:
      summary: Upload new score sheets for a piece
      operationId: uploadScoreSheets
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Uploaded score sheets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScoreSheetDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/pieces/{id}/history:
    get:
      summary: Get piece revision history
      operationId: getPieceHistory
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Piece revision history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PieceHistoryRevisionDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/pieces/{id}/history/{revisionId}/preview:
    get:
      summary: Preview piece at a specific revision
      operationId: previewPieceAtRevision
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/revisionId'
      responses:
        '200':
          description: Piece preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/pieces/{id}/history/{revisionId}/revert:
    post:
      summary: Revert piece to a specific revision
      operationId: revertPieceToRevision
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/revisionId'
      responses:
        '201':
          description: Piece reverted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/rooms:
    get:
      summary: Get all accessible rooms
      operationId: getRooms
      tags:
        - rooms
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomMetadataDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new room
      operationId: createRoom
      tags:
        - rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequestDto'
      responses:
        '201':
          description: Created room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/rooms/{id}:
    get:
      summary: Get a specific room
      operationId: getRoom
      tags:
        - rooms
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete a specific room
      operationId: deleteRoom
      tags:
        - rooms
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)
    revisionId:
      name: revisionId
      in: path
      required: true
      schema:
        type: integer
      description: Revision number to revert to

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    NoContent:
      description: No content

  schemas:
    ErrorDto:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    FrontendConfigDto:
      type: object
      properties:
        oidc:
          type: object
          properties:
            issuer:
              type: string
              format: uri
            clientId:
              type: string
            scope:
              type: string

    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          format: uri
      required: [ id, firstName, lastName, email ]

    PieceMetadataDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        composer:
          type: string
        year:
          type: string
        description:
          type: string
        difficulty:
          type: string
        bpmRange:
          type: string
        isPublic:
          type: boolean
      required: [ id, title, composer, year, description, difficulty, bpmRange, isPublic ]

    PieceDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        composer:
          type: string
        year:
          type: string
        description:
          type: string
        difficulty:
          type: string
        bpmRange:
          type: string
        isPublic:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PiecePermissionDto'
        scoreSheets:
          type: array
          items:
            $ref: '#/components/schemas/ScoreSheetDto'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SectionDto'
      required: [ id, title, composer, year, description, difficulty, bpmRange, isPublic, permissions, scoreSheets, sections ]

    PieceCreateRequestDto:
      type: object
      properties:
        title:
          type: string
        composer:
          type: string
        year:
          type: string
        description:
          type: string
        difficulty:
          type: string
        bpmRange:
          type: string
        isPublic:
          type: boolean
      required: [ title, composer, year, description, difficulty, bpmRange, isPublic ]

    ScoreSheetDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        title:
          type: string
        imageUrl:
          type: string
          format: uri
      required: [ id, position, title, imageUrl ]

    SectionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        name:
          type: string
        timeSignatureNumerator:
          type: integer
        timeSignatureDenominator:
          type: integer
        barCount:
          type: integer
        bpm:
          type: integer
        scoreSheetId:
          type:
            - string
            - 'null'
          format: uuid
        posX1:
          type: number
          format: float
        posY1:
          type: number
          format: float
        posX2:
          type: number
          format: float
        posY2:
          type: number
          format: float
      required: [ id, position, name, timeSignatureNumerator, timeSignatureDenominator, barCount, bpm, scoreSheetId, posX1, posY1, posX2, posY2 ]

    PiecePermissionDto:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserDto'
        permissionType:
          $ref: '#/components/schemas/PermissionType'
      required: [ user, permissionType ]

    RoomMetadataDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        ownerId:
          type: string
          format: uuid
        pieceId:
          type:
            - string
            - 'null'
          format: uuid
      required: [ id, title, ownerId ]

    RoomDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        ownerId:
          type: string
          format: uuid
        pieceId:
          type:
            - string
            - 'null'
          format: uuid
        playing:
          type: boolean
          default: false
        lastPlaySectionPosition:
          type:
            - integer
            - 'null'
        lastPlayTimestamp:
          type:
            - string
            - 'null'
          format: timestamp
        tempoMultiplier:
          type: number
          format: float
          default: 1.0
        roomUsers:
          type: array
          items:
            $ref: '#/components/schemas/UserDto'
      required: [ id, title, ownerId, tempoMultiplier, roomUsers ]

    RoomCreateRequestDto:
      type: object
      properties:
        title:
          type: string
        pieceId:
          type:
            - string
            - 'null'
          format: uuid
      required: [ title ]

    PermissionType:
      type: string
      enum: [ READER, EDITOR, OWNER ]

    RevisionKind:
      type: string
      enum: [ DEFAULT, REVERT ]

    PieceHistoryRevisionDto:
      type: object
      properties:
        revisionId:
          type: integer
        user:
          $ref: '#/components/schemas/UserDto'
        timestamp:
          type: string
          format: timestamp
        revisionKind:
          $ref: '#/components/schemas/RevisionKind'
      required: [ revisionId, user, timestamp, revisionKind ]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: Bearer
      bearerFormat: JWT
