openapi: 3.1.0
info:
  title: sheetmusic-learner
  version: 0.0.1
  description: An application for collaboratively learning sheetmusic.
  contact:
    name: Rafael Urben
    url: https://www.rafaelurben.ch/impressum
servers:
  - url: 'http://localhost:8080/'

paths:
  /api/v1/public/frontend-config:
    get:
      summary: Get frontend configuration
      operationId: getFrontendConfig
      tags:
        - public
      responses:
        '200':
          description: Frontend configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendConfigDto'
  /api/v1/users/me:
    get:
      summary: Get the current user
      operationId: getCurrentUser
      tags:
        - users
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pieces:
    get:
      summary: Get all accessible pieces
      operationId: getPieces
      tags:
        - pieces
      responses:
        '200':
          description: List of pieces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PieceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new piece
      operationId: createPiece
      tags:
        - pieces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PieceCreateRequestDto'
      responses:
        '201':
          description: Created piece
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieceDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pieces/{id}:
    get:
      summary: Get a specific piece
      operationId: getPiece
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Piece
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PieceDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pieces/{id}/score/upload:
    post:
      summary: Upload new score sheets for a piece
      operationId: uploadScoreSheets
      tags:
        - pieces
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Uploaded score sheets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScoreSheetDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/rooms:
    get:
      summary: Get all accessible rooms
      operationId: getRooms
      tags:
        - rooms
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new room
      operationId: createRoom
      tags:
        - rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequestDto'
      responses:
        '201':
          description: Created room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/rooms/{id}:
    get:
      summary: Get a specific room
      operationId: getRoom
      tags:
        - rooms
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

  schemas:
    ErrorDto:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    FrontendConfigDto:
      type: object
      properties:
        oidc:
          type: object
          properties:
            issuer:
              type: string
              format: uri
            clientId:
              type: string
            scope:
              type: string

    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
      required: [ id, first_name, last_name, email ]

    PieceDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        composer:
          type: string
        difficulty:
          type: string
        bpm_range:
          type: string
        is_public:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PiecePermissionDto'
        scoreSheets:
          type: array
          items:
            $ref: '#/components/schemas/ScoreSheetDto'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SectionDto'
      required: [ id, title, composer, difficulty, bpm_range, is_public, permissions, scoreSheets, sections ]

    PieceCreateRequestDto:
      type: object
      properties:
        title:
          type: string
        composer:
          type: string
        difficulty:
          type: string
          default: ""
        bpm_range:
          type: string
          default: ""
        is_public:
          type: boolean
          default: false
      required: [ title, composer, is_public ]

    ScoreSheetDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        title:
          type: string
        image_url:
          type: string
          format: uri
      required: [ id, position, title, image_url ]

    SectionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        score_sheet_id:
          type: string
          format: uuid
      required: [ id, score_sheet_id ]

    PiecePermissionDto:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserDto'
        permission_type:
          $ref: '#/components/schemas/PermissionType'
      required: [ user, permission_type ]

    RoomDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        owner_id:
          type: string
          format: uuid
        piece_id:
          type:
            - string
            - 'null'
          format: uuid
        playing:
          type: boolean
          default: false
        last_play_section_position:
          type:
            - string
            - 'null'
          format: number
        last_play_timestamp:
          type:
            - string
            - 'null'
          format: date-time
        tempo_multiplier:
          type: number
          format: float
          default: 1.0
      required: [ id, title, owner_id ]

    RoomCreateRequestDto:
      type: object
      properties:
        title:
          type: string
        piece_id:
          type:
            - string
            - 'null'
          format: uuid
      required: [ title ]

    PermissionType:
      type: string
      enum: [ READER, EDITOR, OWNER ]
