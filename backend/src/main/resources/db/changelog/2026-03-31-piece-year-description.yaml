databaseChangeLog:
  - changeSet:
      id: 20260331-1-add-piece-year-description
      author: Rafael Urben
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: pieces
            columns:
              - column:
                  name: year
                  type: VARCHAR(255)
                  defaultValue: ""
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  defaultValue: ""
                  constraints:
                    nullable: false
