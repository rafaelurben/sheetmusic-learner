spring:
  datasource:
    url: jdbc:h2:mem:sheetmusic-learner;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  liquibase:
    enabled: false

app:
  oidc:
    client-id: test-client
    issuer: http://localhost/test-issuer
    scope: openid profile email api
  s3:
    endpoint-override: http://localhost:9000
    public-base-url: http://localhost:9000/test-bucket
    access-key: test-access
    secret-key: test-secret
    bucket: test-bucket
